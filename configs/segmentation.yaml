task: segmentation

seed: 42

dataset:
  root_dir: "../../person.v1i.coco"
  train:
    img_dir: "train"
    ann_file: "train/_annotations.coco.json"
  val:
    img_dir: "valid"
    ann_file: "valid/_annotations.coco.json"
  test:
    img_dir: "test"
    ann_file: "test/_annotations.coco.json"

model:
  class_names:
    - faces
    - face
  pretrained_weights: "../rf-detr-seg-preview.pt"
  segmentation_head: true

train:
  num_epochs: 5
  batch_size: 2
  grad_accum_steps: 1
  lr: 0.0001
  weight_decay: 0.0001
  num_workers: 2
  device: cuda
  resolution: 480
  amp: true

output:
  dir: "../outputs"
  run_name: "rfdetr_face_segmentation"
  final_model_name: "rfdetr_segmentation_model.pth"
  save_config_copy: true
